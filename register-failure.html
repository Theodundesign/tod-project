.auth-hero{min-height:80vh;display:grid;place-items:center;padding:40px}
.auth-card{width:360px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);padding:24px;border-radius:14px;box-shadow:0 8px 30px rgba(2,6,23,0.6);}

.auth-foot{display:flex;justify-content:space-between;margin-top:12px;font-size:13px}

tyle><style>/* Global UI tokens for toasts, modals, loaders, uploads */
.toast-root{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);background:rgba(6,10,20,0.7);color:#eaf6ff;padding:10px 12px;border-radius:10px;box-shadow:0 6px 20px rgba(2,6,23,0.6);display:flex;align-items:center;gap:12px;min-width:220px}
.toast-success{border-left:4px solid #9ee6a0}
.toast-error{border-left:4px solid #ff9b9b}
.toast-warning{border-left:4px solid #ffd27a}
.toast-info{border-left:4px solid #7dd3fc}
.toast-title{font-weight:600;margin-bottom:2px}
.toast-close{margin-left:auto;background:transparent;border:none;color:inherit}

.modal-backdrop{position:fixed;inset:0;background:linear-gradient(180deg, rgba(2,6,23,0.6), rgba(2,6,23,0.8));display:grid;place-items:center;z-index:1000}
.modal-card{background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;min-width:320px;max-width:900px}

.loader{display:grid;place-items:center}
.loader .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,#7dd3fc,#5b21b6);animation:spin 1s linear infinite}
@keyframes spin{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}

.empty-state{display:grid;place-items:center;padding:24px;color:#bcdff6}
.empty-icon{font-size:32px;margin-bottom:8px}

.upload-dropzone{border:2px dashed rgba(255,255,255,0.04);padding:20px;border-radius:12px;background:rgba(255,255,255,0.02)}
.upload-cta{padding:18px;display:grid;place-items:center;color:#9fbff7}
.upload-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.upload-card{display:flex;gap:12px;align-items:center;padding:8px;border-radius:10px;background:rgba(255,255,255,0.02)}
.upload-card .meta{flex:1 1;display:flex;justify-content:space-between}
